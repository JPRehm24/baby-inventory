<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Baby Inventory</title>
<script type="module">
  import { BrowserMultiFormatReader, NotFoundException } from 'https://esm.sh/@zxing/library@0.20.0';
  window.ZXingReader = new BrowserMultiFormatReader();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --cream: #fdf6ee;
    --warm-white: #fffaf4;
    --sage: #7a9e7e;
    --sage-light: #b5ceb8;
    --sage-dark: #4e7353;
    --blush: #e8b4a0;
    --blush-light: #f4d4c8;
    --text: #2c2416;
    --text-muted: #8a7a6a;
    --border: #e4d8cc;
    --shadow: 0 2px 12px rgba(44,36,22,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(44,36,22,0.06);
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--sage-dark);
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 300;
  }

  .main { max-width: 520px; margin: 0 auto; padding: 20px 16px 0; }

  .scanner-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .scanner-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .scanner-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }

  .scanner-icon {
    width: 32px; height: 32px;
    background: var(--sage-light);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  #scanner-viewport {
    position: relative;
    width: 100%;
    background: #1a1a1a;
    display: none;
  }

  #scanner-video {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .scan-frame {
    width: 240px; height: 120px;
    border: 2px solid var(--blush);
    border-radius: 10px;
    box-shadow: 0 0 0 2000px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }

  .scan-frame::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blush), transparent);
    animation: scanline 1.8s ease-in-out infinite;
  }

  @keyframes scanline {
    0%   { top: 10%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  .scanner-controls { padding: 14px 20px 18px; display: flex; flex-direction: column; gap: 10px; }

  .btn-scan {
    width: 100%;
    padding: 13px;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.18s, transform 0.1s;
  }

  .btn-scan:active { transform: scale(0.98); }
  .btn-scan:hover { background: var(--sage-dark); }
  .btn-scan.scanning { background: var(--blush); }
  .btn-scan.scanning:hover { background: #d4927a; }

  .manual-row { display: flex; gap: 8px; }

  .manual-row input {
    flex: 1;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.18s;
  }

  .manual-row input:focus { border-color: var(--sage); }

  .btn-lookup {
    padding: 11px 16px;
    background: var(--blush);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s;
  }

  .btn-lookup:hover { background: #d4927a; }

  .product-form {
    background: var(--warm-white);
    border: 1.5px solid var(--sage-light);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    display: none;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .product-form.visible { display: block; }

  .product-info-row {
    display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px;
  }

  .product-thumb {
    width: 64px; height: 64px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 10px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .product-thumb-placeholder {
    width: 64px; height: 64px;
    background: var(--cream);
    border: 1px dashed var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .product-name-field { flex: 1; }

  .product-name-field label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  .product-name-field input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    background: var(--cream);
    color: var(--text);
    outline: none;
  }

  .product-name-field input:focus { border-color: var(--sage); }

  .form-row { display: flex; gap: 10px; margin-bottom: 10px; }

  .form-group { flex: 1; }

  .form-group label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    background: var(--cream);
    color: var(--text);
    outline: none;
    appearance: none;
    transition: border-color 0.18s;
  }

  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--sage); }

  .form-group textarea { resize: none; height: 60px; }

  .form-actions { display: flex; gap: 8px; margin-top: 14px; }

  .btn-add {
    flex: 1;
    padding: 12px;
    background: var(--sage-dark);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s;
  }

  .btn-add:hover { background: #3d5c42; }

  .btn-cancel {
    padding: 12px 18px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    cursor: pointer;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .list-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .item-count {
    background: var(--sage-light);
    color: var(--sage-dark);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .btn-export {
    padding: 8px 14px;
    background: var(--cream);
    color: var(--sage-dark);
    border: 1px solid var(--sage-light);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.18s;
  }

  .btn-export:hover { background: var(--sage-light); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .filter-chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid var(--border);
    background: var(--warm-white);
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .filter-chip.active {
    background: var(--sage);
    color: white;
    border-color: var(--sage);
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon { font-size: 2.8rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.5; }

  .inventory-list { display: flex; flex-direction: column; gap: 10px; }

  .item-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    box-shadow: var(--shadow);
    animation: fadeUp 0.22s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item-img {
    width: 52px; height: 52px;
    object-fit: contain;
    border-radius: 8px;
    background: var(--cream);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .item-img-placeholder {
    width: 52px; height: 52px;
    background: var(--cream);
    border: 1px dashed var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-name {
    font-weight: 500;
    font-size: 0.92rem;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .item-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }

  .tag {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .tag-cat  { background: var(--blush-light); color: #7a4a38; }
  .tag-cond { background: var(--sage-light);  color: var(--sage-dark); }

  .item-barcode { font-size: 0.7rem; color: var(--text-muted); font-family: monospace; }
  .item-notes   { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; font-style: italic; }

  .item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--cream);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    transition: background 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: #fde8e0; color: #c0392b; border-color: #fde8e0; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--cream);
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .status-bar {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 6px 0 2px;
    min-height: 22px;
    text-align: center;
  }

  .status-bar.loading { color: var(--sage); }
  .status-bar.error   { color: #c0392b; }
  .status-bar.success { color: var(--sage-dark); }
</style>
</head>
<body>

<header>
  <h1>🍼 Baby Inventory</h1>
  <p>Scan barcodes to build your list</p>
</header>

<div class="main">

  <div class="scanner-card">
    <div class="scanner-header">
      <div class="scanner-icon">📷</div>
      <h2>Scan a Barcode</h2>
    </div>
    <div id="scanner-viewport">
      <video id="scanner-video" autoplay muted playsinline></video>
      <div class="scanner-overlay"><div class="scan-frame"></div></div>
    </div>
    <div class="scanner-controls">
      <button class="btn-scan" id="scanBtn" onclick="toggleScanner()">
        <span id="scanBtnIcon">📷</span>
        <span id="scanBtnText">Start Camera Scanner</span>
      </button>
      <div class="manual-row">
        <input type="text" id="barcodeInput" placeholder="Or type barcode manually…" inputmode="numeric" />
        <button class="btn-lookup" onclick="lookupBarcode()">Look Up</button>
      </div>
      <div class="status-bar" id="statusBar"></div>
    </div>
  </div>

  <div class="product-form" id="productForm">
    <div class="product-info-row">
      <div id="productThumbWrap" class="product-thumb-placeholder">🛍️</div>
      <div class="product-name-field">
        <label>Product Name</label>
        <input type="text" id="productName" placeholder="Enter product name…" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="productCategory">
          <option value="">Select…</option>
          <option>Feeding</option>
          <option>Sleep</option>
          <option>Clothing</option>
          <option>Bath & Care</option>
          <option>Diapering</option>
          <option>Gear & Travel</option>
          <option>Toys & Play</option>
          <option>Safety</option>
          <option>Health</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Condition</label>
        <select id="productCondition">
          <option value="">Select…</option>
          <option>New (unopened)</option>
          <option>New (opened)</option>
          <option>Like New</option>
          <option>Good</option>
          <option>Fair</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="productNotes" placeholder="Any notes (size, color, where stored…)"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-add" onclick="addItem()">✓ Add to Inventory</button>
      <button class="btn-cancel" onclick="cancelForm()">Cancel</button>
    </div>
  </div>

  <div class="list-header">
    <div style="display:flex;align-items:center;gap:8px">
      <h2>Inventory</h2>
      <span class="item-count" id="itemCount">0 items</span>
    </div>
    <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div class="filter-row">
    <div class="filter-chip active" onclick="setFilter('All',this)">All</div>
    <div class="filter-chip" onclick="setFilter('Feeding',this)">Feeding</div>
    <div class="filter-chip" onclick="setFilter('Sleep',this)">Sleep</div>
    <div class="filter-chip" onclick="setFilter('Clothing',this)">Clothing</div>
    <div class="filter-chip" onclick="setFilter('Bath & Care',this)">Bath & Care</div>
    <div class="filter-chip" onclick="setFilter('Diapering',this)">Diapering</div>
    <div class="filter-chip" onclick="setFilter('Gear & Travel',this)">Gear & Travel</div>
    <div class="filter-chip" onclick="setFilter('Toys & Play',this)">Toys & Play</div>
    <div class="filter-chip" onclick="setFilter('Other',this)">Other</div>
  </div>

  <div id="inventoryList"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { BrowserMultiFormatReader, NotFoundException } from 'https://esm.sh/@zxing/library@0.20.0';

let inventory = JSON.parse(localStorage.getItem('babyInventory') || '[]');
let currentFilter = 'All';
let scannerRunning = false;
let currentBarcode = '';
let currentImageUrl = '';
let codeReader = null;

function saveInventory() { localStorage.setItem('babyInventory', JSON.stringify(inventory)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setStatus(msg, type = '') {
  const s = document.getElementById('statusBar');
  s.textContent = msg;
  s.className = 'status-bar' + (type ? ' ' + type : '');
}

// ── SCANNER ──────────────────────────────────────────
window.toggleScanner = function() {
  scannerRunning ? stopScanner() : startScanner();
};

async function startScanner() {
  const viewport = document.getElementById('scanner-viewport');
  const video    = document.getElementById('scanner-video');
  viewport.style.display = 'block';
  document.getElementById('scanBtn').classList.add('scanning');
  document.getElementById('scanBtnIcon').textContent = '⏹';
  document.getElementById('scanBtnText').textContent = 'Stop Scanner';
  setStatus('Point camera at barcode…', 'loading');

  try {
    codeReader = new BrowserMultiFormatReader();
    const devices = await BrowserMultiFormatReader.listVideoInputDevices();
    // Prefer rear camera
    const device = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
    const deviceId = device ? device.deviceId : undefined;

    scannerRunning = true;
    await codeReader.decodeFromVideoDevice(deviceId, video, (result, err) => {
      if (result) {
        const code = result.getText();
        stopScanner();
        document.getElementById('barcodeInput').value = code;
        lookupBarcodeValue(code);
      }
      // NotFoundException is normal while scanning — ignore it
    });
  } catch (err) {
    setStatus('Camera error: ' + err.message, 'error');
    stopScanner();
  }
}

function stopScanner() {
  if (codeReader) { codeReader.reset(); codeReader = null; }
  scannerRunning = false;
  document.getElementById('scanner-viewport').style.display = 'none';
  document.getElementById('scanBtn').classList.remove('scanning');
  document.getElementById('scanBtnIcon').textContent = '📷';
  document.getElementById('scanBtnText').textContent = 'Start Camera Scanner';
}

// ── BARCODE LOOKUP ────────────────────────────────────
window.lookupBarcode = function() {
  const val = document.getElementById('barcodeInput').value.trim();
  if (!val) { setStatus('Enter a barcode first.', 'error'); return; }
  lookupBarcodeValue(val);
};

async function lookupBarcodeValue(barcode) {
  setStatus('Looking up product…', 'loading');
  currentBarcode = barcode;
  currentImageUrl = '';

  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await r.json();
    if (data.status === 1 && data.product) {
      const p = data.product;
      const name = p.product_name || p.generic_name || '';
      const img  = p.image_front_small_url || p.image_url || '';
      if (name) { populateForm(name, img, barcode); setStatus('Product found!', 'success'); return; }
    }
  } catch(e) {}

  try {
    const r2 = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${barcode}`);
    const d2 = await r2.json();
    if (d2.items && d2.items.length > 0) {
      const item = d2.items[0];
      const name = item.title || '';
      const img  = (item.images && item.images[0]) || '';
      if (name) { populateForm(name, img, barcode); setStatus('Product found!', 'success'); return; }
    }
  } catch(e) {}

  populateForm('', '', barcode);
  setStatus('Product not found — fill in details below.', 'error');
}

function populateForm(name, imgUrl, barcode) {
  document.getElementById('productName').value = name;
  currentImageUrl = imgUrl;
  const wrap = document.getElementById('productThumbWrap');
  if (imgUrl) {
    wrap.innerHTML = `<img src="${imgUrl}" class="product-thumb" onerror="this.parentElement.innerHTML='🛍️'"/>`;
    wrap.className = '';
  } else {
    wrap.innerHTML = '🛍️';
    wrap.className = 'product-thumb-placeholder';
  }
  document.getElementById('productForm').classList.add('visible');
  document.getElementById('productName').focus();
}

window.cancelForm = function() {
  document.getElementById('productForm').classList.remove('visible');
  document.getElementById('barcodeInput').value = '';
  setStatus('');
  currentBarcode = '';
  currentImageUrl = '';
};

// ── ADD ITEM ──────────────────────────────────────────
window.addItem = function() {
  const name = document.getElementById('productName').value.trim();
  if (!name) { showToast('Please enter a product name.'); return; }
  const item = {
    id: Date.now(),
    barcode: currentBarcode,
    name,
    category:  document.getElementById('productCategory').value || 'Other',
    condition: document.getElementById('productCondition').value,
    notes:     document.getElementById('productNotes').value.trim(),
    image:     currentImageUrl,
    addedAt:   new Date().toLocaleDateString()
  };
  inventory.unshift(item);
  saveInventory();
  renderList();
  window.cancelForm();
  showToast('✓ Added to inventory!');
};

window.deleteItem = function(id) {
  inventory = inventory.filter(i => i.id !== id);
  saveInventory();
  renderList();
  showToast('Item removed.');
};

window.setFilter = function(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
};

function renderList() {
  const list     = document.getElementById('inventoryList');
  const filtered = currentFilter === 'All' ? inventory : inventory.filter(i => i.category === currentFilter);
  document.getElementById('itemCount').textContent = inventory.length + ' item' + (inventory.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🧸</div><p>${
      inventory.length === 0 ? 'No items yet.<br>Scan a barcode to get started!' : 'No items in this category.'
    }</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="item-card">
      ${item.image
        ? `<img src="${item.image}" class="item-img" onerror="this.style.display='none'" />`
        : `<div class="item-img-placeholder">${categoryEmoji(item.category)}</div>`}
      <div class="item-body">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-meta">
          <span class="tag tag-cat">${esc(item.category)}</span>
          ${item.condition ? `<span class="tag tag-cond">${esc(item.condition)}</span>` : ''}
        </div>
        ${item.barcode ? `<div class="item-barcode">${esc(item.barcode)}</div>` : ''}
        ${item.notes   ? `<div class="item-notes">${esc(item.notes)}</div>`   : ''}
      </div>
      <div class="item-actions">
        <button class="btn-icon" onclick="deleteItem(${item.id})">🗑</button>
      </div>
    </div>`).join('');
}

function categoryEmoji(cat) {
  return {'Feeding':'🍼','Sleep':'🛏️','Clothing':'👕','Bath & Care':'🛁','Diapering':'🧷','Gear & Travel':'🚗','Toys & Play':'🧸','Safety':'🔒','Health':'💊','Other':'📦'}[cat] || '📦';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.exportCSV = function() {
  if (inventory.length === 0) { showToast('Nothing to export yet!'); return; }
  const headers = ['Name','Category','Condition','Notes','Barcode','Date Added'];
  const rows = inventory.map(i =>
    [i.name, i.category, i.condition, i.notes, i.barcode, i.addedAt]
    .map(v => `"${(v||'').replace(/"/g,'""')}"`)
  );
  const csv  = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'baby-inventory.csv';
  a.click();
  showToast('CSV downloaded!');
};

document.getElementById('barcodeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.lookupBarcode();
});

renderList();
</script>
